<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Centre Opérationnel</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:20px; }
h1 { text-align:center; }

.top { display:flex; justify-content:space-between; }

input, select { margin:5px; padding:6px; }
button { padding:6px; margin:5px; cursor:pointer; }

table { width:100%; background:white; color:black; border-collapse:collapse; }
th, td { border:1px solid #ccc; padding:8px; text-align:center; }

.status-Disponible { background:#22c55e; }
.status-Indisponible { background:#ef4444; }
.status-Intervention { background:#f97316; }
.status-Procedure { background:#3b82f6; }

.panic { animation:blink 1s infinite; background:red !important; color:white; }
@keyframes blink { 50% { opacity:0.3; } }
</style>
</head>

<body>

<div class="top">
<div id="tnDisplay">TN : Aucun</div>
<div>
<button onclick="setTN()">Se définir TN</button>
<button onclick="removeTN()">Retirer TN</button>
</div>
</div>

<h1>🚓 Centre de Gestion des Patrouilles</h1>

<div id="auth">
<input id="username" placeholder="Identifiant (TR12A)">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="register()">Créer</button>
<button onclick="login()">Connexion</button>
<p id="error" style="color:red;"></p>
</div>

<div id="app" style="display:none;">

<h3>Créer une patrouille</h3>

<input id="indicatif" placeholder="TV-12-A">
<input id="vehicule" placeholder="Peugeot 5008">

<select id="effectifs" multiple></select>

<select id="arme">
<option>Non</option>
<option>Oui</option>
</select>

<select id="opj">
<option>Non</option>
<option>Oui</option>
</select>

<input id="mission" placeholder="Police secours">

<select id="statut">
<option>Disponible</option>
<option>Indisponible</option>
<option>Sur intervention</option>
<option>En procédure</option>
</select>

<button onclick="addPatrol()">Ajouter</button>

<h3>Patrouilles</h3>

<table>
<thead>
<tr>
<th>Indicatif</th>
<th>Véhicule</th>
<th>Effectifs</th>
<th>Mission</th>
<th>Statut</th>
<th>Action</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

<button onclick="panic()" style="background:red;">🚨 PANIC</button>
<button onclick="dispatch()" style="background:orange;">📢 DISPATCH</button>

</div>

<script>

// 🔥 CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCoU9LDrg1D4hC-ql4GpvKT5YnSaBVXEFI",
  authDomain: "gestion-patrouilles-5503d.firebaseapp.com",
  databaseURL: "https://gestion-patrouilles-5503d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "gestion-patrouilles-5503d",
  storageBucket: "gestion-patrouilles-5503d.firebasestorage.app",
  messagingSenderId: "482427611880",
  appId: "1:482427611880:web:b5df2a72fc41194784375d"
};

firebase.initializeApp(firebaseConfig);

const authFirebase = firebase.auth();
const db = firebase.database();

let currentUser = null;
let patrols = {};
let users = {};

// 🔥 CONVERSION IDENTIFIANT → EMAIL (CORRIGÉ)
function toEmail(u){
  let clean = u.toLowerCase().replace(/[^a-z0-9]/g,"");
  return clean + "@patrol.fr";
}

// 🔐 AUTH
function register(){
  let email = toEmail(username.value);

  authFirebase.createUserWithEmailAndPassword(email, password.value)
  .then(()=>{
    db.ref("users/"+username.value).set(true);
    error.innerText="Compte créé";
  })
  .catch(e=>error.innerText=e.message);
}

function login(){
  let email = toEmail(username.value);

  authFirebase.signInWithEmailAndPassword(email, password.value)
  .catch(e=>error.innerText=e.message);
}

authFirebase.onAuthStateChanged(user=>{
  if(user){
    currentUser = username.value;
    auth.style.display="none";
    app.style.display="block";
    loadUsers();
    listenPatrols();
    listenTN();
  }
});

// 👥 USERS
function loadUsers(){
  db.ref("users").on("value", snap=>{
    users = snap.val() || {};
    effectifs.innerHTML="";
    Object.keys(users).forEach(u=>{
      let o=document.createElement("option");
      o.value=u;
      o.textContent=u;
      effectifs.appendChild(o);
    });
  });
}

// 🚓 PATROUILLES
function addPatrol(){
  db.ref("patrols").push({
    indicatif: indicatif.value,
    vehicule: vehicule.value,
    effectifs: Array.from(effectifs.selectedOptions).map(o=>o.value),
    mission: mission.value,
    statut: statut.value,
    panic:false
  });
}

function listenPatrols(){
  db.ref("patrols").on("value", snap=>{
    patrols = snap.val() || {};
    render();
  });
}

function render(){
  list.innerHTML="";
  for(let id in patrols){
    let p = patrols[id];
    let tr = document.createElement("tr");

    if(p.panic) tr.classList.add("panic");

    tr.innerHTML = `
<td>${p.indicatif}</td>
<td>${p.vehicule}</td>
<td>${p.effectifs.join(", ")}</td>
<td>${p.mission}</td>
<td>
<select onchange="updateStatus('${id}', this.value)">
<option ${p.statut==="Disponible"?"selected":""}>Disponible</option>
<option ${p.statut==="Indisponible"?"selected":""}>Indisponible</option>
<option ${p.statut==="Sur intervention"?"selected":""}>Sur intervention</option>
<option ${p.statut==="En procédure"?"selected":""}>En procédure</option>
</select>
</td>
<td><button onclick="deletePatrol('${id}')">Supprimer</button></td>
`;

    list.appendChild(tr);
  }
}

function updateStatus(id,val){
  db.ref("patrols/"+id).update({statut:val});
}

function deletePatrol(id){
  db.ref("patrols/"+id).remove();
}

// 🚨 PANIC
function panic(){
  for(let id in patrols){
    if(patrols[id].effectifs.includes(currentUser)){
      db.ref("patrols/"+id).update({panic:true});
      beep(600);
      setTimeout(()=>db.ref("patrols/"+id).update({panic:false}),90000);
    }
  }
}

// 📢 DISPATCH
function dispatch(){
  beep(300,900);
}

// 🔊 SON
function beep(duration,freq=440){
  let ctx=new AudioContext();
  let osc=ctx.createOscillator();
  osc.frequency.value=freq;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(),duration);
}

// 🎛️ TN
function setTN(){
  db.ref("tn").set(currentUser);
}

function removeTN(){
  db.ref("tn").remove();
}

function listenTN(){
  db.ref("tn").on("value", snap=>{
    tnDisplay.innerText="TN : "+(snap.val()||"Aucun");
  });
}

</script>

</body>
</html>
