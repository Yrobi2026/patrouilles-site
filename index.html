<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion Patrouilles GTA RP</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    margin: 0;
}

.container {
    padding: 20px;
}

.hidden { display: none; }

input, select, button {
    padding: 8px;
    margin: 5px;
}

button {
    cursor: pointer;
}

.card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
    margin-bottom: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

td, th {
    border: 1px solid #334155;
    padding: 8px;
    text-align: center;
}

.status-disponible { background: green; }
.status-indisponible { background: red; }
.status-intervention { background: orange; }
.status-procedure { background: blue; }

.notification {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #111827;
    padding: 10px 15px;
    border-radius: 8px;
    display: none;
}
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
    <h2>Connexion</h2>
    <input id="username" placeholder="Identifiant">
    <input id="password" type="password" placeholder="Mot de passe">
    <button onclick="login()">Connexion</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

    <h2>Centre de gestion patrouilles</h2>

    <button onclick="logout()">Déconnexion</button>

    <!-- CREATION -->
    <div class="card">
        <h3>Créer une patrouille</h3>

        <input id="indicatif" placeholder="Indicatif">
        <input id="vehicule" placeholder="Véhicule">
        <input id="mission" placeholder="Mission">

        <br>

        <label>Statut</label>
        <select id="status">
            <option>Disponible</option>
            <option>Indisponible</option>
            <option>Sur intervention</option>
            <option>En procédure</option>
        </select>

        <br>

        <button onclick="createPatrol()">Créer</button>
    </div>

    <!-- TABLE -->
    <div class="card">
        <h3>Patrouilles</h3>
        <table>
            <thead>
                <tr>
                    <th>Indicatif</th>
                    <th>Véhicule</th>
                    <th>Mission</th>
                    <th>Statut</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="patrolTable"></tbody>
        </table>
    </div>

</div>

<div id="notif" class="notification"></div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCoU9LDrg1D4hC-ql4GpvKT5YnSaBVXEFI",
  authDomain: "gestion-patrouilles-5503d.firebaseapp.com",
  databaseURL: "https://gestion-patrouilles-5503d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "gestion-patrouilles-5503d",
  storageBucket: "gestion-patrouilles-5503d.firebasestorage.app",
  messagingSenderId: "482427611880",
  appId: "1:482427611880:web:b5df2a72fc41194784375d"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* LOGIN SIMPLE (IDENTIFIANT → EMAIL) */
function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const email = username + "@patrol.fr";

    auth.signInWithEmailAndPassword(email, password)
    .then(() => {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        listenPatrols();
        showNotif("Connexion réussie");
    })
    .catch(err => alert(err.message));
}

function logout() {
    auth.signOut();
    location.reload();
}

/* CREATION PATROUILLE */
function createPatrol() {
    const data = {
        indicatif: indicatif.value,
        vehicule: vehicule.value,
        mission: mission.value,
        status: status.value
    };

    db.ref("patrouilles").push(data);
    showNotif("Patrouille créée");
}

/* AFFICHAGE */
function listenPatrols() {
    db.ref("patrouilles").on("value", snap => {
        const table = document.getElementById("patrolTable");
        table.innerHTML = "";

        snap.forEach(child => {
            const p = child.val();
            const id = child.key;

            const tr = document.createElement("tr");

            let colorClass = "";
            if(p.status === "Disponible") colorClass = "status-disponible";
            if(p.status === "Indisponible") colorClass = "status-indisponible";
            if(p.status === "Sur intervention") colorClass = "status-intervention";
            if(p.status === "En procédure") colorClass = "status-procedure";

            tr.innerHTML = `
                <td>${p.indicatif}</td>
                <td>${p.vehicule}</td>
                <td>${p.mission}</td>
                <td class="${colorClass}">
                    <select onchange="updateStatus('${id}', this.value)">
                        <option ${p.status==="Disponible"?"selected":""}>Disponible</option>
                        <option ${p.status==="Indisponible"?"selected":""}>Indisponible</option>
                        <option ${p.status==="Sur intervention"?"selected":""}>Sur intervention</option>
                        <option ${p.status==="En procédure"?"selected":""}>En procédure</option>
                    </select>
                </td>
                <td>
                    <button onclick="deletePatrol('${id}')">Supprimer</button>
                </td>
            `;

            table.appendChild(tr);
        });
    });
}

/* UPDATE STATUS */
function updateStatus(id, value) {
    db.ref("patrouilles/" + id).update({ status: value });
    showNotif("Statut modifié");
}

/* DELETE */
function deletePatrol(id) {
    db.ref("patrouilles/" + id).remove();
    showNotif("Patrouille supprimée");
}

/* NOTIFICATIONS */
function showNotif(msg) {
    const n = document.getElementById("notif");
    n.innerText = msg;
    n.style.display = "block";
    setTimeout(() => n.style.display = "none", 3000);
}
</script>

</body>
</html>
