<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Gestion Patrouilles</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:20px; }
input, select { width:100%; padding:6px; margin-top:5px; }
button { padding:8px; margin-top:10px; cursor:pointer; }

table { width:100%; background:white; color:black; border-collapse:collapse; margin-top:20px; }
th, td { border:1px solid #ccc; padding:8px; text-align:center; }

.panic { animation:blink 1s infinite; background:red !important; color:white; }
@keyframes blink { 50% { opacity:0.3; } }

#notifications {
  position: fixed;
  bottom: 20px;
  right: 20px;
}
.toast {
  background:#1e293b;
  padding:10px;
  margin-top:5px;
  border-left:5px solid green;
}

#globalNotif {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:red;
  color:white;
  padding:20px;
  font-size:20px;
  display:none;
  z-index:9999;
}
</style>
</head>

<body>

<h2>Connexion</h2>
<div id="auth">
<input id="username" placeholder="Identifiant">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="register()">Créer compte</button>
<button onclick="login()">Connexion</button>
<p id="error" style="color:red;"></p>
</div>

<div id="app" style="display:none;">

<button onclick="logout()">Déconnexion</button>

<h3>Créer patrouille</h3>

<label>Effectifs (CTRL)</label>
<select id="effectifs" multiple></select>

<label>Arme longue</label>
<select id="arme" onchange="toggleArme()">
<option>Non</option>
<option>Oui</option>
</select>

<select id="armeEffectif" style="display:none;"></select>

<label>OPJ</label>
<select id="opj" onchange="toggleOPJ()">
<option>Non</option>
<option>Oui</option>
</select>

<select id="opjList" multiple style="display:none;"></select>

<input id="indicatif" placeholder="Indicatif">
<input id="vehicule" placeholder="Véhicule">
<input id="mission" placeholder="Mission">

<select id="statut">
<option>Disponible</option>
<option>Indisponible</option>
<option>Sur intervention</option>
<option>En procédure</option>
</select>

<button onclick="addPatrol()">Créer patrouille</button>

<h3>Patrouilles</h3>

<table>
<thead>
<tr>
<th>Indicatif</th>
<th>Véhicule</th>
<th>Effectifs</th>
<th>Statut</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

<button onclick="panic()">🚨 PANIC</button>
<button onclick="dispatch()">📢 DISPATCH</button>

<!-- ADMIN -->
<div id="adminPanel" style="display:none; background:#1e293b; padding:10px; margin-top:20px;">
<h3>👑 Admin Panel</h3>

<h4>Utilisateurs</h4>
<ul id="userList"></ul>

<h4>Message global</h4>
<input id="adminMessage" placeholder="Message">
<button onclick="sendGlobalMessage()">Envoyer</button>

</div>

</div>

<div id="notifications"></div>
<div id="globalNotif"></div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCoU9LDrg1D4hC-ql4GpvKT5YnSaBVXEFI",
  authDomain: "gestion-patrouilles-5503d.firebaseapp.com",
  databaseURL: "https://gestion-patrouilles-5503d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "gestion-patrouilles-5503d",
  storageBucket: "gestion-patrouilles-5503d.firebasestorage.app",
  messagingSenderId: "482427611880",
  appId: "1:482427611880:web:b5df2a72fc41194784375d"
};

firebase.initializeApp(firebaseConfig);

const authFirebase = firebase.auth();
const db = firebase.database();

let currentUser="";
let isAdmin=false;
let presenceRef=null;

// NOTIF
function notify(msg){
  let div=document.createElement("div");
  div.className="toast";
  div.innerText=msg;
  notifications.appendChild(div);
  setTimeout(()=>div.remove(),4000);
}

// EMAIL CONVERSION
function toEmail(u){
  return u.toLowerCase().replace(/[^a-z0-9]/g,"")+"@patrol.fr";
}

// REGISTER
function register(){
  authFirebase.createUserWithEmailAndPassword(
    toEmail(username.value),
    password.value
  ).then(()=>{
    db.ref("users/"+username.value).set(true);
    notify("Compte créé");
  }).catch(e=>error.innerText=e.message);
}

// LOGIN
function login(){
  authFirebase.signInWithEmailAndPassword(
    toEmail(username.value),
    password.value
  ).then(()=>{
    if(username.value==="admin" && password.value==="admin1"){
      isAdmin=true;
    }
  }).catch(e=>error.innerText=e.message);
}

// LOGOUT
function logout(){
  authFirebase.signOut().then(()=>location.reload());
}

// AUTH STATE
authFirebase.onAuthStateChanged(user=>{
  if(user){
    currentUser=username.value;

    if(currentUser==="admin") isAdmin=true;

    presenceRef=db.ref("presence/"+currentUser);
    presenceRef.set(true);
    presenceRef.onDisconnect().remove();

    auth.style.display="none";
    app.style.display="block";

    if(isAdmin){
      adminPanel.style.display="block";
      loadUsersAdmin();
    }

    loadUsers();
    listenPatrols();
    listenGlobalNotif();
  }
});

// USERS ONLINE
function loadUsers(){
  db.ref("presence").on("value", snap=>{
    let data=snap.val()||{};

    effectifs.innerHTML="";
    armeEffectif.innerHTML="";
    opjList.innerHTML="";

    Object.keys(data).forEach(u=>{
      let o=document.createElement("option");
      o.value=u;o.textContent=u;
      effectifs.appendChild(o);

      armeEffectif.appendChild(o.cloneNode(true));
      opjList.appendChild(o.cloneNode(true));
    });
  });
}

// ADMIN USERS
function loadUsersAdmin(){
  db.ref("users").on("value", snap=>{
    let data=snap.val()||{};
    userList.innerHTML="";

    Object.keys(data).forEach(u=>{
      let li=document.createElement("li");
      li.innerHTML=`
      ${u}
      <button onclick="deleteUser('${u}')">Supprimer</button>
      `;
      userList.appendChild(li);
    });
  });
}

function deleteUser(u){
  if(!isAdmin) return;

  db.ref("users/"+u).remove();
  db.ref("presence/"+u).remove();

  notify("Utilisateur supprimé");
}

// TOGGLES
function toggleArme(){
  armeEffectif.style.display = arme.value==="Oui"?"block":"none";
}
function toggleOPJ(){
  opjList.style.display = opj.value==="Oui"?"block":"none";
}

// ADD PATROL
function addPatrol(){
  let eff=[...effectifs.selectedOptions].map(o=>o.value);

  db.ref("patrols").push({
    indicatif: indicatif.value||"Non défini",
    vehicule: vehicule.value||"Non défini",
    effectifs: eff,
    arme: arme.value,
    armeEffectif: armeEffectif.value||"",
    opjList: [...opjList.selectedOptions].map(o=>o.value),
    mission: mission.value||"",
    statut: statut.value||"Disponible",
    panic:false
  });

  notify("Patrouille créée");
}

// PATROLS
let patrols={};

function listenPatrols(){
  db.ref("patrols").on("value", snap=>{
    patrols=snap.val()||{};
    render();
  });
}

// RENDER
function render(){
  list.innerHTML="";

  Object.entries(patrols).forEach(([id,p])=>{

    let tr=document.createElement("tr");

    if(p.panic) tr.classList.add("panic");

    let statut=p.statut||"Disponible";

    tr.innerHTML=`
<td>${p.indicatif}</td>
<td>${p.vehicule}</td>
<td>${(p.effectifs||[]).join(", ")}</td>

<td>
<select onchange="updateStatus('${id}',this.value)">
<option ${statut==="Disponible"?"selected":""}>Disponible</option>
<option ${statut==="Indisponible"?"selected":""}>Indisponible</option>
<option ${statut==="Sur intervention"?"selected":""}>Sur intervention</option>
<option ${statut==="En procédure"?"selected":""}>En procédure</option>
</select>
</td>

<td>
<button onclick="editPatrol('${id}')">Modifier</button>
<button onclick="deletePatrol('${id}')">Supprimer</button>
</td>
`;

    list.appendChild(tr);
  });
}

// STATUS
function updateStatus(id,val){
  db.ref("patrols/"+id).update({statut:val});
}

// EDIT
function editPatrol(id){
  let p=patrols[id];

  let indicatif=prompt("Indicatif",p.indicatif);
  let vehicule=prompt("Véhicule",p.vehicule);
  let mission=prompt("Mission",p.mission);
  let statut=prompt("Statut",p.statut);

  db.ref("patrols/"+id).update({indicatif,vehicule,mission,statut});
}

// DELETE PATROL
function deletePatrol(id){
  db.ref("patrols/"+id).remove();
}

// PANIC
function panic(){
  let ctx=new AudioContext();
  let osc=ctx.createOscillator();
  osc.frequency.value=800;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(),2500);

  notify("🚨 PANIC");
}

// DISPATCH
function dispatch(){
  let ctx=new AudioContext();
  let osc=ctx.createOscillator();
  osc.frequency.value=900;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(),300);

  notify("📢 DISPATCH");
}

// GLOBAL NOTIF
function sendGlobalMessage(){
  if(!isAdmin) return;

  let msg=adminMessage.value;

  db.ref("globalNotif").set({
    message:msg,
    time:Date.now()
  });

  notify("Message envoyé");
}

// LISTEN GLOBAL
function listenGlobalNotif(){
  db.ref("globalNotif").on("value", snap=>{
    let d=snap.val();
    if(d){
      globalNotif.innerText=d.message;
      globalNotif.style.display="block";

      setTimeout(()=>globalNotif.style.display="none",5000);
    }
  });
}

</script>

</body>
</html>
