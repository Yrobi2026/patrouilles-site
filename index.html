<script>
const firebaseConfig = {
  apiKey: "AIzaSyCoU9LDrg1D4hC-ql4GpvKT5YnSaBVXEFI",
  authDomain: "gestion-patrouilles-5503d.firebaseapp.com",
  databaseURL: "https://gestion-patrouilles-5503d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "gestion-patrouilles-5503d",
  storageBucket: "gestion-patrouilles-5503d.firebasestorage.app",
  messagingSenderId: "482427611880",
  appId: "1:482427611880:web:b5df2a72fc41194784375d"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* ===================== */
/* ELEMENTS HTML         */
/* ===================== */
const authDiv = document.getElementById("auth");
const appDiv = document.getElementById("app");
const errorDiv = document.getElementById("error");

/* ===================== */
/* UTIL EMAIL            */
/* ===================== */
function toEmail(u){
  return u.toLowerCase().replace(/[^a-z0-9]/g,"")+"@app.fr";
}

/* ===================== */
/* NOTIFICATIONS         */
/* ===================== */
function notify(msg){
  const div=document.createElement("div");
  div.className="toast";
  div.innerText=msg;
  document.getElementById("notifications").appendChild(div);
  setTimeout(()=>div.remove(),4000);
}

/* ===================== */
/* REGISTER              */
/* ===================== */
function register(){
  const email = toEmail(username.value);
  const pass = password.value;

  auth.createUserWithEmailAndPassword(email, pass)
  .then(()=>{
    db.ref("users/"+username.value).set({online:true});
    notify("Compte créé");
  })
  .catch(e=>{
    console.error(e);
    errorDiv.innerText = e.message;
  });
}

/* ===================== */
/* LOGIN                 */
/* ===================== */
function login(){
  const email = toEmail(username.value);
  const pass = password.value;

  errorDiv.innerText = "";

  auth.signInWithEmailAndPassword(email, pass)
  .then(()=>{
    console.log("Connexion réussie");
  })
  .catch(e=>{
    console.error(e);
    errorDiv.innerText = e.message;
  });
}

/* ===================== */
/* AUTH STATE            */
/* ===================== */
auth.onAuthStateChanged(user=>{
  if(user){
    console.log("User connecté:", user.email);

    authDiv.style.display="none";
    appDiv.style.display="block";

    const name = username.value;
    db.ref("users/"+name).update({online:true});

    currentUser = name;

    loadUsers();
    listenPatrols();
    listenTN();
  } else {
    authDiv.style.display="block";
    appDiv.style.display="none";
  }
});

/* ===================== */
/* LOGOUT                */
/* ===================== */
function logout(){
  db.ref("users/"+currentUser).update({online:false});
  auth.signOut();
}

/* ===================== */
/* USERS ONLINE          */
/* ===================== */
function loadUsers(){
  db.ref("users").on("value", snap=>{
    const data = snap.val() || {};
    const select = document.getElementById("effectifs");

    select.innerHTML="";

    Object.entries(data).forEach(([name,u])=>{
      if(u.online){
        let opt=document.createElement("option");
        opt.value=name;
        opt.textContent=name;
        select.appendChild(opt);
      }
    });
  });
}

/* ===================== */
/* PATROUILLES           */
/* ===================== */
let patrols={};

function listenPatrols(){
  db.ref("patrols").on("value", snap=>{
    patrols = snap.val() || {};
    render();
  });
}

function render(){
  const list=document.getElementById("list");
  list.innerHTML="";

  Object.entries(patrols).forEach(([id,p])=>{

    let tr=document.createElement("tr");

    if(p.panic){
      tr.classList.add("panic");
    }

    let color="green";
    if(p.statut==="Indisponible") color="red";
    if(p.statut==="Sur intervention") color="orange";

    tr.innerHTML=`
<td>${p.indicatif||""}</td>
<td>${p.vehicule||""}</td>
<td>${(p.effectifs||[]).join(", ")}</td>

<td>
<select onchange="updateStatus('${id}',this.value)" style="background:${color};color:white;">
<option ${p.statut==="Disponible"?"selected":""}>Disponible</option>
<option ${p.statut==="Indisponible"?"selected":""}>Indisponible</option>
<option ${p.statut==="Sur intervention"?"selected":""}>Sur intervention</option>
<option ${p.statut==="En procédure"?"selected":""}>En procédure</option>
</select>
</td>

<td>
<button onclick="deletePatrol('${id}')">Supprimer</button>
</td>
`;

    list.appendChild(tr);
  });
}

function updateStatus(id,val){
  db.ref("patrols/"+id).update({statut:val});
}

/* ===================== */
/* ADD PATROL            */
/* ===================== */
function addPatrol(){

  let eff=[...effectifs.selectedOptions].map(o=>o.value);

  db.ref("patrols").push({
    indicatif: indicatif.value,
    vehicule: vehicule.value,
    effectifs: eff,
    statut: statut.value,
    panic:false
  });

  notify("Patrouille créée");
}

/* ===================== */
/* DELETE                */
/* ===================== */
function deletePatrol(id){
  db.ref("patrols/"+id).remove();
}

/* ===================== */
/* TN                    */
/* ===================== */
function setTN(){
  db.ref("tn").set(currentUser);
}

function removeTN(){
  db.ref("tn").remove();
}

function listenTN(){
  db.ref("tn").on("value", snap=>{
    tnDisplay.innerText="TN: "+(snap.val()||"Aucun");
  });
}

/* ===================== */
/* PANIC SOUND           */
/* ===================== */
function panic(){
  Object.entries(patrols).forEach(([id,p])=>{
    if((p.effectifs||[]).includes(currentUser)){
      db.ref("patrols/"+id).update({panic:true});

      playAlarm();

      setTimeout(()=>{
        db.ref("patrols/"+id).update({panic:false});
      },90000);
    }
  });

  notify("PANIC déclenché");
}

function playAlarm(){
  let ctx=new AudioContext();
  let o1=ctx.createOscillator();
  let o2=ctx.createOscillator();
  let g=ctx.createGain();

  g.gain.value=0.2;
  o1.connect(g);
  o2.connect(g);
  g.connect(ctx.destination);

  o1.start(); o2.start();

  let start=ctx.currentTime;
  let dur=2.5;

  function loop(){
    let t=ctx.currentTime-start;
    if(t<dur/2){
      o1.frequency.value=700;
      o2.frequency.value=1200;
    } else {
      o1.frequency.value=1200;
      o2.frequency.value=700;
    }
    if(t<dur) requestAnimationFrame(loop);
  }

  loop();

  setTimeout(()=>{
    o1.stop();
    o2.stop();
  },2500);
}

/* ===================== */
/* DISPATCH              */
/* ===================== */
function dispatch(){
  let ctx=new AudioContext();
  let o=ctx.createOscillator();
  o.frequency.value=900;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),400);

  notify("Dispatch envoyé");
}
</script>
