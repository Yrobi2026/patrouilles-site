<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Centre Opérationnel Elite</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:20px; }

input, select { width:100%; padding:6px; margin-top:5px; }

button { padding:8px; margin-top:10px; cursor:pointer; }

table { width:100%; background:white; color:black; border-collapse:collapse; margin-top:20px; }
th, td { border:1px solid #ccc; padding:8px; text-align:center; }

label { font-weight:bold; margin-top:10px; display:block; }

/* PANIC */
.panic { animation:blink 1s infinite; background:red !important; color:white; }
@keyframes blink { 50% { opacity:0.3; } }

/* NOTIFICATIONS */
#notifications {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 9999;
}

.toast {
  background: #1e293b;
  color: white;
  padding: 10px 15px;
  border-left: 5px solid #22c55e;
  border-radius: 5px;
  min-width: 250px;
}

/* GLOBAL MESSAGE */
#globalBanner {
  display:none;
  background:red;
  color:white;
  padding:15px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<h1 style="text-align:center;">🚓 Centre Opérationnel Elite</h1>

<div id="globalBanner"></div>

<div id="auth">
<input id="username" placeholder="Identifiant">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="register()">Créer compte</button>
<button onclick="login()">Connexion</button>
<p id="error" style="color:red;"></p>
</div>

<div id="adminPanel" style="display:none; background:#1e293b; padding:10px; margin-bottom:10px;">
<h3>👑 Panel Admin</h3>

<input id="adminMessage" placeholder="Message global...">
<button onclick="sendGlobalMessage()">Envoyer annonce</button>

<br><br>

<select id="adminUsers"></select>
<button onclick="deleteUser()">Supprimer utilisateur</button>
</div>

<div id="app" style="display:none;">

<div style="display:flex; justify-content:space-between;">
<div id="tnDisplay">TN : Aucun</div>
<div>
<button onclick="setTN()">TN</button>
<button onclick="removeTN()">Retirer TN</button>
<button onclick="logout()">Déconnexion</button>
</div>
</div>

<h3>Créer une patrouille</h3>

<label>Effectifs</label>
<select id="effectifs" multiple></select>

<label>OPJ à bord ?</label>
<select id="opj" onchange="toggleOPJ()">
<option value="Non">Non</option>
<option value="Oui">Oui</option>
</select>

<select id="opjSelect"></select>

<label>Arme longue à bord ?</label>
<select id="armeLongue" onchange="toggleArmeLongue()">
<option value="Non">Non</option>
<option value="Oui">Oui</option>
</select>

<select id="armeLongueSelect"></select>

<label>Indicatif</label>
<input id="indicatif">

<label>Véhicule</label>
<input id="vehicule">

<label>Mission</label>
<input id="mission">

<label>Statut</label>
<select id="statut">
<option>Disponible</option>
<option>Indisponible</option>
<option>Sur intervention</option>
<option>En procédure</option>
</select>

<button onclick="addPatrol()">Ajouter patrouille</button>

<h3>Patrouilles</h3>

<table>
<thead>
<tr>
<th>Indicatif</th>
<th>Véhicule</th>
<th>Effectifs</th>
<th>Statut</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

<button onclick="panic()" style="background:red;color:white;">🚨 PANIC</button>
<button onclick="dispatch()" style="background:orange;color:white;">📢 DISPATCH</button>

</div>

<div id="notifications"></div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCoU9LDrg1D4hC-ql4GpvKT5YnSaBVXEFI",
  authDomain: "gestion-patrouilles-5503d.firebaseapp.com",
  databaseURL: "https://gestion-patrouilles-5503d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "gestion-patrouilles-5503d",
  storageBucket: "gestion-patrouilles-5503d.firebasestorage.app",
  messagingSenderId: "482427611880",
  appId: "1:482427611880:web:b5df2a72fc41194784375d"
};

firebase.initializeApp(firebaseConfig);

const authFirebase = firebase.auth();
const db = firebase.database();

let currentUser="";
let isAdmin=false;

function notify(msg){
  let div=document.createElement("div");
  div.className="toast";
  div.innerText=msg;
  notifications.appendChild(div);
  setTimeout(()=>div.remove(),4000);
}

function toEmail(u){
  return u.toLowerCase().replace(/[^a-z0-9]/g,"")+"@patrol.fr";
}

/* ADMIN */
function checkAdmin(){
  if(username.value==="admin" && password.value==="admin123"){
    isAdmin=true;
    adminPanel.style.display="block";
  }
}

function register(){
  authFirebase.createUserWithEmailAndPassword(toEmail(username.value), password.value)
  .then(()=>{
    db.ref("users/"+username.value).set({online:true});
  }).catch(e=>error.innerText=e.message);
}

function login(){
  checkAdmin();
  authFirebase.signInWithEmailAndPassword(toEmail(username.value), password.value)
  .catch(e=>error.innerText=e.message);
}

function logout(){
  db.ref("users/"+currentUser).update({online:false});
  authFirebase.signOut().then(()=>location.reload());
}

authFirebase.onAuthStateChanged(user=>{
  if(user){
    currentUser=username.value;

    db.ref("users/"+currentUser).update({online:true});

    auth.style.display="none";
    app.style.display="block";

    loadUsers();
    listenPatrols();
    listenTN();
    listenGlobalMessage();
  }
});

/* USERS */
function loadUsers(){
  db.ref("users").on("value", snap=>{
    let data=snap.val()||{};

    effectifs.innerHTML="";
    opjSelect.innerHTML="";
    armeLongueSelect.innerHTML="";
    adminUsers.innerHTML="";

    Object.entries(data).forEach(([u,val])=>{
      if(val && val.online){

        let o=document.createElement("option");
        o.value=u;o.textContent=u;
        effectifs.appendChild(o);

        let o2=document.createElement("option");
        o2.value=u;o2.textContent=u;
        opjSelect.appendChild(o2);

        let o3=document.createElement("option");
        o3.value=u;o3.textContent=u;
        armeLongueSelect.appendChild(o3);

        if(isAdmin){
          let oa=document.createElement("option");
          oa.value=u;
          oa.textContent=u;
          adminUsers.appendChild(oa);
        }
      }
    });
  });
}

/* TOGGLES */
function toggleOPJ(){
  opjSelect.style.display = opj.value==="Oui" ? "block":"none";
}

function toggleArmeLongue(){
  armeLongueSelect.style.display = armeLongue.value==="Oui" ? "block":"none";
}

/* ADD PATROL */
function addPatrol(){

  let eff=[...effectifs.selectedOptions].map(o=>o.value);

  db.ref("patrols").push({
    indicatif:indicatif.value,
    vehicule:vehicule.value,
    effectifs:eff,
    statut:statut.value,
    opj:opj.value,
    opjEffectif: opj.value==="Oui" ? opjSelect.value : null,
    armeLongue:armeLongue.value,
    armeEffectif: armeLongue.value==="Oui" ? armeLongueSelect.value : null,
    panic:false
  });

  notify("Patrouille créée");
}

/* RENDER */
let patrols={};

function listenPatrols(){
  db.ref("patrols").on("value", snap=>{
    patrols=snap.val()||{};
    render();
  });
}

function render(){
  list.innerHTML="";

  Object.entries(patrols).forEach(([id,p])=>{

    let color="#22c55e";
    if(p.statut==="Indisponible") color="#ef4444";
    if(p.statut==="Sur intervention") color="#f97316";
    if(p.statut==="En procédure") color="#3b82f6";

    let tr=document.createElement("tr");
    if(p.panic) tr.classList.add("panic");

    let opjText = p.opj==="Oui" ? "OPJ: Oui ("+p.opjEffectif+")" : "OPJ: Non";
    let armeText = p.armeLongue==="Oui" ? "Arme: Oui ("+p.armeEffectif+")" : "Arme: Non";

    tr.innerHTML=`
<td>${p.indicatif||""}</td>
<td>${p.vehicule||""}</td>
<td>${(p.effectifs||[]).join(", ")}<br>${opjText}<br>${armeText}</td>

<td>
<select onchange="updateStatus('${id}',this.value)" style="background:${color};color:white;">
<option ${p.statut==="Disponible"?"selected":""}>Disponible</option>
<option ${p.statut==="Indisponible"?"selected":""}>Indisponible</option>
<option ${p.statut==="Sur intervention"?"selected":""}>Sur intervention</option>
<option ${p.statut==="En procédure"?"selected":""}>En procédure</option>
</select>
</td>

<td>
<button onclick="deletePatrol('${id}')">Supprimer</button>
</td>
`;
    list.appendChild(tr);
  });
}

function updateStatus(id,val){
  db.ref("patrols/"+id).update({statut:val});
}

function deletePatrol(id){
  db.ref("patrols/"+id).remove();
}

/* ADMIN DELETE USER */
function deleteUser(){
  if(!isAdmin) return;
  db.ref("users/"+adminUsers.value).remove();
}

/* GLOBAL MESSAGE */
function sendGlobalMessage(){
  if(!isAdmin) return;

  db.ref("globalMessage").set({
    text: adminMessage.value,
    time: Date.now()
  });

  playSound();
}

function listenGlobalMessage(){
  db.ref("globalMessage").on("value", snap=>{
    let data=snap.val();
    if(data){
      globalBanner.style.display="block";
      globalBanner.innerText=data.text;

      setTimeout(()=>{
        globalBanner.style.display="none";
      },10000);
    }
  });
}

/* TN */
function setTN(){ db.ref("tn").set(currentUser); }
function removeTN(){ db.ref("tn").remove(); }

function listenTN(){
  db.ref("tn").on("value", snap=>{
    tnDisplay.innerText="TN : "+(snap.val()||"Aucun");
  });
}

/* SOUND */
function playSound(){
  let ctx=new AudioContext();
  let osc=ctx.createOscillator();
  osc.frequency.value=1000;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(),300);
}

/* PANIC */
function panic(){ notify("PANIC"); }

/* DISPATCH */
function dispatch(){
  playSound();
  notify("Dispatch");
}

</script>

</body>
</html>
