<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Centre Opérationnel Elite</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:20px; }

input, select { width:100%; padding:6px; margin-top:5px; }

button { padding:8px; margin-top:10px; cursor:pointer; }

table { width:100%; background:white; color:black; border-collapse:collapse; margin-top:20px; }
th, td { border:1px solid #ccc; padding:8px; text-align:center; }

label { font-weight:bold; margin-top:10px; display:block; }

/* PANIC VISUEL */
.panic { animation:blink 1s infinite; background:red !important; color:white; }
@keyframes blink { 50% { opacity:0.3; } }

/* NOTIFICATIONS */
#notifications {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  z-index: 9999;
}

.toast {
  background: #1e293b;
  color: white;
  padding: 10px 15px;
  border-left: 5px solid #22c55e;
  border-radius: 5px;
  min-width: 250px;
  animation: slideIn 0.3s ease, fadeOut 0.5s ease 4s forwards;
}

.toast.warning { border-left-color: orange; }
.toast.danger { border-left-color: red; }
.toast.info { border-left-color: #3b82f6; }

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

@keyframes fadeOut {
  to { opacity: 0; transform: translateX(100%); }
}
</style>
</head>

<body>

<h1 style="text-align:center;">🚓 Centre Opérationnel Elite</h1>

<div id="auth">
<input id="username" placeholder="Identifiant (TR12A)">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="register()">Créer compte</button>
<button onclick="login()">Connexion</button>
<p id="error" style="color:red;"></p>
</div>

<div id="app" style="display:none;">

<div style="display:flex; justify-content:space-between;">
<div id="tnDisplay">TN : Aucun</div>
<div>
<button onclick="setTN()">TN</button>
<button onclick="removeTN()">Retirer TN</button>
<button onclick="logout()">Déconnexion</button>
</div>
</div>

<h3>Créer une patrouille</h3>

<label>Recherche effectifs</label>
<input id="searchEffectifs" oninput="filterUsers()" placeholder="Rechercher un agent...">

<p style="font-size:12px;">Maintenir CTRL pour sélectionner plusieurs effectifs</p>

<label>Effectifs</label>
<select id="effectifs" multiple></select>

<label>Arme longue</label>
<select id="arme" onchange="toggleArme()">
<option value="Non">Non</option>
<option value="Oui">Oui</option>
</select>

<select id="armeEffectif"></select>

<label>OPJ</label>
<select id="opj" onchange="toggleOPJ()">
<option value="Non">Non</option>
<option value="Oui">Oui</option>
</select>

<select id="opjList" multiple></select>

<label>Indicatif</label>
<input id="indicatif">

<label>Véhicule</label>
<input id="vehicule">

<label>Mission</label>
<input id="mission">

<label>Statut</label>
<select id="statut">
<option>Disponible</option>
<option>Indisponible</option>
<option>Sur intervention</option>
<option>En procédure</option>
</select>

<button onclick="addPatrol()">Ajouter patrouille</button>

<h3>Patrouilles</h3>

<table>
<thead>
<tr>
<th>Indicatif</th>
<th>Véhicule</th>
<th>Effectifs / Rôles</th>
<th>Statut</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

<button onclick="panic()" style="background:red;color:white;">🚨 PANIC</button>
<button onclick="dispatch()" style="background:orange;color:white;">📢 DISPATCH</button>

</div>

<div id="notifications"></div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCoU9LDrg1D4hC-ql4GpvKT5YnSaBVXEFI",
  authDomain: "gestion-patrouilles-5503d.firebaseapp.com",
  databaseURL: "https://gestion-patrouilles-5503d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "gestion-patrouilles-5503d",
  storageBucket: "gestion-patrouilles-5503d.firebasestorage.app",
  messagingSenderId: "482427611880",
  appId: "1:482427611880:web:b5df2a72fc41194784375d"
};

firebase.initializeApp(firebaseConfig);

const authFirebase = firebase.auth();
const db = firebase.database();

let currentUser="";

// NOTIFICATIONS
function notify(msg,type="info"){
  let div=document.createElement("div");
  div.className="toast "+type;
  div.innerText=msg;
  notifications.appendChild(div);
  setTimeout(()=>div.remove(),5000);
}

// AUTH
function toEmail(u){
  return u.toLowerCase().replace(/[^a-z0-9]/g,"")+"@patrol.fr";
}

function register(){
  authFirebase.createUserWithEmailAndPassword(
    toEmail(username.value),
    password.value
  ).then(()=>{
    db.ref("users/"+username.value).set(true);
    notify("Compte créé","info");
  }).catch(e=>error.innerText=e.message);
}

function login(){
  authFirebase.signInWithEmailAndPassword(
    toEmail(username.value),
    password.value
  ).catch(e=>error.innerText=e.message);
}

function logout(){
  authFirebase.signOut().then(()=>location.reload());
}

authFirebase.onAuthStateChanged(user=>{
  if(user){
    currentUser=username.value;
    auth.style.display="none";
    app.style.display="block";
    loadUsers();
    listenPatrols();
    listenTN();
  }
});

// USERS
function loadUsers(){
  db.ref("users").on("value", snap=>{
    let data=snap.val()||{};

    effectifs.innerHTML="";
    armeEffectif.innerHTML="";
    opjList.innerHTML="";

    Object.keys(data).forEach(u=>{
      let o1=document.createElement("option");
      o1.value=u;o1.textContent=u;
      effectifs.appendChild(o1);

      let o2=document.createElement("option");
      o2.value=u;o2.textContent=u;
      armeEffectif.appendChild(o2);

      let o3=document.createElement("option");
      o3.value=u;o3.textContent=u;
      opjList.appendChild(o3);
    });
  });
}

// SEARCH
function filterUsers(){
  let search = searchEffectifs.value.toLowerCase();
  Array.from(effectifs.options).forEach(o=>{
    o.style.display = o.textContent.toLowerCase().includes(search) ? "" : "none";
  });
}

// TOGGLES
function toggleArme(){
  armeEffectif.style.display = arme.value==="Oui" ? "block":"none";
}
function toggleOPJ(){
  opjList.style.display = opj.value==="Oui" ? "block":"none";
}

// ADD
function addPatrol(){

  let eff = Array.from(effectifs.selectedOptions).map(o=>o.value);

  db.ref("patrols").push({
    indicatif: indicatif.value,
    vehicule: vehicule.value,
    effectifs: eff,
    arme: arme.value,
    armeEffectif: armeEffectif.value,
    opjList: Array.from(opjList.selectedOptions).map(o=>o.value),
    mission: mission.value,
    statut: statut.value,
    panic:false
  });

  notify("Patrouille créée","info");
}

// LISTEN
let patrols={};

function listenPatrols(){
  db.ref("patrols").on("value", snap=>{
    patrols=snap.val()||{};
    render();
  });
}

// RENDER
function render(){
  list.innerHTML="";

  Object.entries(patrols).forEach(([id,p])=>{

    let color="#22c55e";
    if(p.statut==="Indisponible") color="#ef4444";
    if(p.statut==="Sur intervention") color="#f97316";
    if(p.statut==="En procédure") color="#3b82f6";

    let tr=document.createElement("tr");

    if(p.panic) tr.classList.add("panic");

    let opjText = (p.opjList && p.opjList.length>0)
      ? "OPJ: oui ("+p.opjList.join(", ")+")"
      : "OPJ: non";

    let armeText = (p.arme==="Oui")
      ? "Arme: "+p.armeEffectif
      : "Arme: non";

    tr.innerHTML=`
<td>${p.indicatif}</td>
<td>${p.vehicule}</td>
<td>${(p.effectifs||[]).join(", ")}<br>${opjText}<br>${armeText}</td>

<td>
<select onchange="updateStatus('${id}',this.value)" style="background:${color};color:white;">
<option ${p.statut==="Disponible"?"selected":""}>Disponible</option>
<option ${p.statut==="Indisponible"?"selected":""}>Indisponible</option>
<option ${p.statut==="Sur intervention"?"selected":""}>Sur intervention</option>
<option ${p.statut==="En procédure"?"selected":""}>En procédure</option>
</select>
</td>

<td>
<button onclick="editPatrol('${id}')">Modifier</button>
<button onclick="deletePatrol('${id}')">Supprimer</button>
</td>
`;
    list.appendChild(tr);
  });
}

function updateStatus(id,val){
  db.ref("patrols/"+id).update({statut:val});
  notify("Statut mis à jour","info");
}

// EDIT
function editPatrol(id){
  let p=patrols[id];

  let indicatif=prompt("Indicatif",p.indicatif);
  let vehicule=prompt("Véhicule",p.vehicule);
  let mission=prompt("Mission",p.mission);
  let statut=prompt("Statut",p.statut);

  db.ref("patrols/"+id).update({indicatif,vehicule,mission,statut});
}

// DELETE
function deletePatrol(id){
  db.ref("patrols/"+id).remove();
}

// PANIC AUDIO FIX
function panic(){

  Object.entries(patrols).forEach(([id,p])=>{
    if((p.effectifs||[]).includes(currentUser)){
      db.ref("patrols/"+id).update({panic:true});
      playAlarm();
      setTimeout(()=>db.ref("patrols/"+id).update({panic:false}),90000);
    }
  });

  notify("🚨 PANIC déclenché","danger");
}

function playAlarm(){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();

  let osc1 = ctx.createOscillator();
  let osc2 = ctx.createOscillator();
  let gain = ctx.createGain();

  gain.gain.value=0.2;

  osc1.type="sine";
  osc2.type="sine";

  osc1.connect(gain);
  osc2.connect(gain);
  gain.connect(ctx.destination);

  osc1.start();
  osc2.start();

  let start = ctx.currentTime;
  let duration = 2500;

  function loop(){
    let t = ctx.currentTime - start;

    if(t < duration/2){
      osc1.frequency.setValueAtTime(700, ctx.currentTime);
      osc2.frequency.setValueAtTime(1200, ctx.currentTime);
    } else {
      osc1.frequency.setValueAtTime(1200, ctx.currentTime);
      osc2.frequency.setValueAtTime(700, ctx.currentTime);
    }

    if(t < duration){
      requestAnimationFrame(loop);
    }
  }

  loop();

  setTimeout(()=>{
    osc1.stop();
    osc2.stop();
  }, duration);
}

// DISPATCH
function dispatch(){
  let ctx=new AudioContext();
  let osc=ctx.createOscillator();
  osc.frequency.value=900;
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(()=>osc.stop(),300);
  notify("📢 Dispatch","warning");
}

// TN
function setTN(){
  db.ref("tn").set(currentUser);
  notify("Vous êtes TN","info");
}

function removeTN(){
  db.ref("tn").remove();
  notify("TN retiré","warning");
}

function listenTN(){
  db.ref("tn").on("value", snap=>{
    tnDisplay.innerText="TN : "+(snap.val()||"Aucun");
  });
}

</script>

</body>
</html>
